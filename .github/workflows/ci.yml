name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run fmt:check

      - name: Check shell formatting
        run: npm run shell:fmt:check

      - name: Lint
        run: npm run lint

      - name: Lint shell scripts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run shell:check

      - name: Test
        run: npm run test

      - name: Type check
        run: npm run typecheck

      - name: Run CLI check
        run: npm run check
